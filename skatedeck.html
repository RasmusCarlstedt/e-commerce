<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/main.css" />
    <!-- Monserat font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Luckiest+Guy&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Luckiest guy font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Luckiest+Guy&display=swap"
      rel="stylesheet"
    />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <nav class="site-nav">
      <div class="nav-left">
        <a href="index.html"
          ><img class="logo" src="img/skatelogo.png" alt="company logo"
        /></a>
        <a class="logo-text" href="index.html">Zappos</a>
      </div>

      <ul class="nav-right">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
    <section class="product-page">
      <div class="product-image">
        <img src="img/skateboard 2.jpg" alt="Blue checkered skatedeck" />
      </div>

      <div class="product-details">
        <h1>Blue skate deck</h1>
        <p class="price">€89.99</p>
        <p class="description">
          High quality bamboo street deck built for street performance
        </p>

        <div class="controls">
          <div class="quantity">
            <button id="minus-button" type="button">-</button>
            <span id="quantity-number">1</span>
            <button id="plus-button" type="button">+</button>
          </div>

          <button id="add-cart-button" class="add-cart" type="button">
            Add to cart
          </button>
        </div>
      </div>
    </section>
    <footer>&copy Zappos</footer>
  </body>
</html>
